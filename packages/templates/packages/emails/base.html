<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .email-wrapper {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .email-header {
            background: linear-gradient(135deg, #2C5F2D 0%, #1B3B1C 100%);
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
        }
        
        .email-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        
        .email-body {
            padding: 30px 20px;
        }
        
        .email-footer {
            background-color: #f5f7fa;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        
        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #2C5F2D;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            margin: 10px 0;
        }
        
        .button:hover {
            background-color: #1B3B1C;
        }
        
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #2C5F2D;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
        }
        
        .info-row {
            margin: 10px 0;
        }
        
        .info-label {
            font-weight: 600;
            color: #555;
            display: inline-block;
            min-width: 140px;
        }
        
        .info-value {
            color: #333;
        }
        
        .success-box {
            background-color: #d4edda;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            color: #155724;
        }
        
        .warning-box {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            color: #856404;
        }
        
        .danger-box {
            background-color: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            color: #721c24;
        }
        
        h2 {
            color: #2C5F2D;
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        
        h3 {
            color: #333;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        p {
            margin: 10px 0;
        }
        
        hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 20px 0;
        }
        
        @media only screen and (max-width: 600px) {
            .email-wrapper {
                margin: 0;
                border-radius: 0;
            }
            
            .email-header, .email-body, .email-footer {
                padding: 20px 15px;
            }
            
            .button {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-header">
            <h1>{% block header_title %}{{ site_name }}{% endblock %}</h1>
        </div>
        
        <div class="email-body">
            {% block content %}{% endblock %}
        </div>
        
        <div class="email-footer">
            {% block footer %}
            <p>
                <strong>{{ site_name }}</strong><br>
                Thank you for choosing us for your travel needs!
            </p>
            <p style="margin-top: 10px; color: #999; font-size: 11px;">
                This is an automated email. Please do not reply directly to this message.
            </p>
            {% endblock %}
        </div>
    </div>
</body>
</html>
