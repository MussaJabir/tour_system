services:
  postgres:
    image: postgres:16-alpine
    container_name: tour_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-tour_system_db}
      - POSTGRES_USER=${DB_USER:-tour_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tour_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tour_network

  redis:
    image: redis:7-alpine
    container_name: tour_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tour_network

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour_django
    restart: unless-stopped
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tour_network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour_celery
    restart: unless-stopped
    entrypoint: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tour_network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour_celery_beat
    restart: unless-stopped
    entrypoint: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tour_network

  nginx:
    image: nginx:alpine
    container_name: tour_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - django
    networks:
      - tour_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  tour_network:
    driver: bridge
