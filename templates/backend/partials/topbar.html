{% load static %}
<!-- ========== Topbar Start ========== -->
<div class="navbar-custom">
    <div class="topbar">
        <div class="topbar-menu d-flex align-items-center gap-lg-2 gap-1">

            <!-- Brand Logo -->
            <div class="logo-box">
                <!-- Brand Logo Light -->
                <a href="{% url 'dashboard_destination_list' %}" class="logo-light">
                    <img src="{% static 'backend/assets/images/logo-light.png' %}" alt="logo" class="logo-lg" height="32">
                    <img src="{% static 'backend/assets/images/logo-light-sm.png' %}" alt="small logo" class="logo-sm" height="32">
                </a>

                <!-- Brand Logo Dark -->
                <a href="{% url 'dashboard_destination_list' %}" class="logo-dark">
                    <img src="{% static 'backend/assets/images/logo-dark.png' %}" alt="dark logo" class="logo-lg" height="32">
                    <img src="{% static 'backend/assets/images/logo-dark-sm.png' %}" alt="small logo" class="logo-sm" height="32">
                </a>
            </div>

            <!-- Sidebar Menu Toggle Button -->
            <button class="button-toggle-menu waves-effect waves-light rounded-circle">
                <i class="mdi mdi-menu"></i>
            </button>
        </div>

        <ul class="topbar-menu d-flex align-items-center gap-2">

            <li class="d-none d-md-inline-block">
                <a class="nav-link waves-effect waves-light" href="#" data-bs-toggle="fullscreen">
                    <i class="mdi mdi-fullscreen font-size-24"></i>
                </a>
            </li>

            <li class="dropdown">
                <a class="nav-link dropdown-toggle arrow-none nav-user" data-bs-toggle="dropdown" href="#" role="button"
                    aria-haspopup="false" aria-expanded="false">
                    <span class="account-user-avatar">
                        <img src="{% static 'backend/assets/images/users/avatar-1.jpg' %}" alt="user-image" width="32" class="rounded-circle">
                    </span>
                    <span class="d-lg-block d-none">
                        <h5 class="my-0 fw-normal">{{ user.get_full_name|default:user.username }} <i
                                class="mdi mdi-chevron-down"></i></h5>
                    </span>
                </a>
                <div class="dropdown-menu dropdown-menu-end dropdown-menu-animated profile-dropdown">
                    <!-- item-->
                    <div class=" dropdown-header noti-title">
                        <h6 class="text-overflow m-0">Welcome !</h6>
                    </div>

                    <!-- item-->
                    <a href="#" class="dropdown-item">
                        <i class="mdi mdi-account-circle me-1"></i>
                        <span>My Account</span>
                    </a>

                    <!-- item-->
                    <a href="#" class="dropdown-item">
                        <i class="mdi mdi-cog me-1"></i>
                        <span>Settings</span>
                    </a>

                    <!-- item-->
                    <a href="/admin/logout/" class="dropdown-item">
                        <i class="mdi mdi-logout me-1"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </li>

        </ul>
    </div>
</div>
<!-- ========== Topbar End ========== -->
