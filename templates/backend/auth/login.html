{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <title>Staff Login | Tour Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{% static 'backend/assets/images/favicon.ico' %}">
    <link href="{% static 'backend/assets/css/style.min.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'backend/assets/css/icons.min.css' %}" rel="stylesheet" type="text/css">
    <script src="{% static 'backend/assets/js/config.js' %}"></script>
</head>
<body class="authentication-bg">

<div class="account-pages mt-5 mb-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-4">

                <div class="card">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h4 class="text-uppercase mt-0">Staff Login</h4>
                            <p class="text-muted">Tour Management System</p>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-{{ message.tags|default:'danger' }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST" action="{% url 'staff_login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input class="form-control" type="text" id="username" name="username"
                                       required placeholder="Enter your username" autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input class="form-control" type="password" id="password" name="password"
                                       required placeholder="Enter your password">
                            </div>
                            <div class="d-grid mb-0 text-center">
                                <button class="btn btn-primary" type="submit">Log In</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="{% static 'backend/assets/libs/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
