# Respect an upstream proxy's protocol (Cloudflare sends X-Forwarded-Proto),
# otherwise fall back to the scheme of the direct connection to nginx.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # Docker's embedded DNS. Combined with the variable in proxy_pass below,
    # this makes nginx re-resolve the "django" service name at runtime instead
    # of caching its IP at startup — so a redeploy that gives the Django
    # container a new IP doesn't leave nginx stuck on a stale address (502).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        # Variable target forces per-request DNS resolution via the resolver above.
        set $django_upstream django;
        proxy_pass http://$django_upstream:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Forward the ORIGINAL scheme. Behind Cloudflare the edge sends
        # X-Forwarded-Proto=https; falling back to $scheme for direct hits.
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

