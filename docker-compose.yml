services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tour_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-tour_system_db}
      - POSTGRES_USER=${DB_USER:-tour_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tour_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tour_network

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: tour_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tour_network

  # Django Application
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour_django
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tour_network
    restart: unless-stopped

  # Celery Worker for background tasks
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour_celery
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - django
      - redis
      - postgres
    networks:
      - tour_network
    restart: unless-stopped

  # Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tour_celery_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - django
      - redis
      - postgres
    networks:
      - tour_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tour_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - django
    networks:
      - tour_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  tour_network:
    driver: bridge
    