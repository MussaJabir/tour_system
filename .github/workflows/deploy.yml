name: Deploy to production

# Auto-deploys to the production server whenever main changes (i.e. after a
# develop -> main promotion PR is merged). Can also be run by hand from the
# Actions tab via "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; queue them instead of clobbering.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e && \
             cd ~/tour_system && \
             git fetch origin main && \
             git reset --hard origin/main && \
             docker compose -f docker-compose.prod.yml up -d --build && \
             docker compose -f docker-compose.prod.yml restart django celery celery-beat nginx && \
             docker image prune -f"
